user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format json_log escape=json
        '{"source_ip":"$http_x_forwarded_for",'
        '"timestamp":"$time_iso8601",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"response_size":$body_bytes_sent}';

    access_log /var/log/nginx/hng-access.log json_log;

    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;
    real_ip_recursive on;

    server {
        listen 80;
        server_name amarachi-detect.duckdns.org;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name amarachi-detect.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/amarachi-detect.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/amarachi-detect.duckdns.org/privkey.pem;

        location / {
            proxy_pass http://172.31.45.38:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass http://nextcloud:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
